<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | GPS RUNNER 志水直樹</title>
  <meta name="description" content="GPSランナー志水直樹へのお問い合わせページ。取材、イベント依頼、講演、その他のご相談はこちらから。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --yellow: #FFE500;
      --black: #0A0A0A;
      --dark: #141414;
      --gray-900: #1A1A1A;
      --gray-800: #2A2A2A;
      --gray-700: #3A3A3A;
      --gray-400: #999;
      --gray-300: #BBB;
      --white: #FAFAFA;
      --danger: #ff7b7b;
      --font-en: 'Inter', sans-serif;
      --font-ja: 'Noto Sans JP', sans-serif;
    }
    html { scroll-behavior: smooth; font-size: 18px; }
    body {
      font-family: var(--font-ja);
      background: radial-gradient(circle at top, rgba(255, 229, 0, 0.08), transparent 35%), var(--black);
      color: var(--white);
      line-height: 1.8;
      overflow-x: hidden;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 0 2rem;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 10, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 229, 0, 0.14);
    }
    header.scrolled {
      background: rgba(10, 10, 10, 0.96);
      border-bottom-color: rgba(255, 229, 0, 0.28);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--white);
    }
    .logo-img {
      height: 40px;
      width: auto;
      display: block;
      border-radius: 8px;
    }
    .logo-text {
      font-family: var(--font-en);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }
    .logo-text span { color: var(--yellow); }
    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    nav a {
      color: var(--gray-400);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: color 0.3s;
      font-family: var(--font-en);
    }
    nav a:hover,
    nav a.active { color: var(--yellow); }
    .nav-cta {
      background: var(--yellow);
      color: var(--black) !important;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-weight: 700 !important;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      background: none;
      border: none;
    }
    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--white);
      transition: all 0.3s;
      display: block;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(10, 10, 10, 0.98);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .mobile-nav.active { display: flex; }
    .mobile-nav a {
      color: var(--white);
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .mobile-nav a:hover { color: var(--yellow); }
    main {
      padding: 120px 2rem 4rem;
    }
    .hero {
      max-width: 760px;
      margin: 0 auto;
    }
    .contact-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      border: 1px solid rgba(255, 229, 0, 0.14);
      border-radius: 28px;
      padding: 2.4rem;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--yellow);
      font-family: var(--font-en);
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }
    .eyebrow::before {
      content: "";
      width: 30px;
      height: 2px;
      background: var(--yellow);
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.08;
      font-weight: 900;
      margin-bottom: 0.75rem;
    }
    h1 span { color: var(--yellow); }
    .lead {
      color: var(--gray-300);
      font-size: 1.08rem;
      margin-bottom: 2rem;
    }
    .contact-card h2 {
      font-size: 1.7rem;
      margin-bottom: 0.4rem;
    }
    .contact-card > p {
      color: var(--gray-400);
      margin-bottom: 1.5rem;
    }
    form {
      display: grid;
      gap: 1rem;
    }
    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    label {
      display: block;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 0.45rem;
      color: var(--white);
    }
    .optional {
      color: var(--gray-400);
      font-weight: 500;
      margin-left: 0.35rem;
      font-size: 0.8rem;
    }
    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--gray-700);
      background: rgba(255, 255, 255, 0.03);
      color: var(--white);
      border-radius: 16px;
      padding: 0.95rem 1rem;
      font: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    select option {
      color: var(--black);
    }
    input::placeholder,
    textarea::placeholder { color: #7f7f7f; }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(255, 229, 0, 0.8);
      box-shadow: 0 0 0 4px rgba(255, 229, 0, 0.12);
      background: rgba(255, 255, 255, 0.05);
    }
    textarea {
      min-height: 180px;
      resize: vertical;
    }
    .form-status {
      min-height: 1.2rem;
      font-size: 0.9rem;
      color: var(--gray-300);
    }
    .form-status.error { color: var(--danger); }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      align-items: center;
      margin-top: 0.25rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      border-radius: 100px;
      padding: 0.95rem 1.6rem;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s, background 0.25s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--yellow);
      color: var(--black);
      box-shadow: 0 14px 40px rgba(255, 229, 0, 0.18);
    }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border-color: var(--gray-700);
    }
    .btn-outline:hover { border-color: rgba(255, 229, 0, 0.5); }
    footer {
      background: var(--dark);
      border-top: 1px solid var(--gray-800);
      padding: 2rem;
      text-align: center;
    }
    footer p {
      font-size: 0.85rem;
      color: var(--gray-700);
      font-family: var(--font-en);
    }
    @media (max-width: 980px) {
      nav { display: none; }
      .hamburger { display: flex; }
    }
    @media (max-width: 680px) {
      header { padding: 0 1.25rem; }
      main { padding: 104px 1.25rem 3rem; }
      .contact-card { padding: 1.5rem; border-radius: 22px; }
      .field-group { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <header id="header">
    <a href="index.html" class="logo">
      <img src="3131553a-7a69-4460-b31b-8082b39b5b1c.jpeg" alt="NAOKI SHIMIZU" class="logo-img">
      <div class="logo-text">GPS <span>RUNNER</span></div>
    </a>
    <nav>
      <a href="index.html">HOME</a>
      <a href="works.html">WORKS</a>
      <a href="profile.html">PROFILE</a>
      <a href="global.html">GLOBAL</a>
      <a href="offer.html">OFFER</a>
      <a href="special.html">PROJECT</a>
      <a href="contact.html" class="nav-cta active">CONTACT</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="メニュー">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <a href="index.html">HOME</a>
    <a href="works.html">WORKS</a>
    <a href="profile.html">PROFILE</a>
    <a href="global.html">GLOBAL</a>
    <a href="offer.html">OFFER</a>
    <a href="special.html">PROJECT</a>
    <a href="support.html">SUPPORT</a>
    <a href="contact.html">CONTACT</a>
  </div>

  <main>
    <section class="hero">
      <div class="contact-card">
        <div class="eyebrow">Contact</div>
        <h1>お問い合わせ<br><span>フォーム</span></h1>
        <p class="lead">必要事項をご入力ください。</p>

        <form id="contactForm" action="https://formsubmit.co/gpsrunnaoki@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="【お問い合わせ】GPS RUNNER">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_next" value="https://gpsrun.vercel.app/contact.html?sent=1">
          <div class="field-group">
            <div>
              <label for="name">名前</label>
              <input id="name" name="名前" type="text" placeholder="例：山田 太郎" required>
            </div>
            <div>
              <label for="email">メールアドレス</label>
              <input id="email" name="メールアドレス" type="email" placeholder="example@example.com" required>
            </div>
          </div>

          <div class="field-group">
            <div>
              <label for="type">お問い合わせ種類</label>
              <select id="type" name="お問い合わせ種類" required>
                <option value="">選択してください</option>
                <option value="取材">取材</option>
                <option value="イベントの依頼">イベントの依頼</option>
                <option value="講演">講演</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div>
              <label for="phone">電話番号<span class="optional">任意</span></label>
              <input id="phone" name="電話番号" type="tel" inputmode="tel" placeholder="例：090-1234-5678">
            </div>
          </div>

          <div>
            <label for="message">相談内容</label>
            <textarea id="message" name="相談内容" placeholder="ご相談内容、ご希望日程、企画概要などをご記入ください。" required></textarea>
          </div>

          <div id="formStatus" class="form-status" aria-live="polite"></div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">メールを送信する</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 GPS RUNNER / Naoki Shimizu. All Rights Reserved.</p>
  </footer>

  <script>
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 50);
    });

    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      mobileNav.classList.toggle('active');
    });

    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');

    if (window.location.search.includes('sent=1')) {
      status.textContent = '送信ありがとうございました。';
      status.classList.remove('error');
      window.history.replaceState({}, '', window.location.pathname);
    }

    form.addEventListener('submit', () => {
      status.textContent = '送信中です...';
      status.classList.remove('error');
    });
  </script>
</body>
</html>
