  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--yellow:#FFE500;--black:#0A0A0A;--dark:#141414;--gray-900:#1A1A1A;--gray-800:#2A2A2A;--gray-700:#3A3A3A;--gray-400:#999;--gray-300:#BBB;--white:#FAFAFA;--font-en:'Inter',sans-serif;--font-ja:'Noto Sans JP',sans-serif}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-ja);background:var(--black);color:var(--white);line-height:1.9;overflow-x:hidden}
    header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 2rem;height:72px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,229,0,0.1)}
    header.scrolled{background:rgba(10,10,10,0.95);border-bottom-color:rgba(255,229,0,0.3)}
    .logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;color:var(--white)}
    .logo-img{height:40px;width:auto;display:block;border-radius:8px}
    .logo-text{font-family:var(--font-en);font-weight:700;font-size:1.1rem;letter-spacing:.08em}
    .logo-text span{color:var(--yellow)}
    nav{display:flex;align-items:center;gap:2rem}
    nav a{color:var(--gray-400);text-decoration:none;font-size:1.25rem;font-weight:500;letter-spacing:.05em;transition:color .3s;font-family:var(--font-en)}
    nav a:hover,nav a.active{color:var(--yellow)}
    .nav-cta{background:var(--yellow);color:var(--black)!important;padding:.5rem 1.25rem;border-radius:100px;font-weight:600!important}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
    .hamburger span{width:24px;height:2px;background:var(--white);transition:all .3s;display:block}
    .hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
    .hamburger.active span:nth-child(2){opacity:0}
    .hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
    .mobile-nav{display:none;position:fixed;inset:0;z-index:999;background:rgba(10,10,10,0.98);flex-direction:column;align-items:center;justify-content:center;gap:2rem}
    .mobile-nav.active{display:flex}
    .mobile-nav a{color:var(--white);text-decoration:none;font-size:1.5rem;font-weight:600}
    .mobile-nav a:hover{color:var(--yellow)}
    .page-hero{padding:120px 2rem 3rem;text-align:center;position:relative}
    .section-label{font-family:var(--font-en);font-size:1.25rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--yellow);margin-bottom:.75rem}
    .page-hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:900;margin-bottom:.75rem}
    .page-hero>p{font-size:1.3rem;color:var(--gray-400);max-width:550px;margin:0 auto}
    .stats-bar{display:flex;justify-content:center;gap:3rem;padding:1.5rem 2rem;margin:1.5rem auto 0;max-width:600px}
    .stat{text-align:center}
    .stat-number{font-family:var(--font-en);font-size:1.6rem;font-weight:800;color:var(--yellow);line-height:1.2}
    .stat-number small{font-size:.5em;font-weight:500}
    .stat-label{font-size:1.25rem;color:var(--gray-400)}
    .toolbar{position:sticky;top:72px;z-index:100;background:rgba(10,10,10,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--gray-800);padding:1rem 2rem}
    .toolbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
    .filters{display:flex;gap:.5rem;flex-wrap:wrap}
    .filter-btn{background:transparent;border:1px solid var(--gray-800);color:var(--gray-400);padding:.45rem 1.1rem;border-radius:100px;font-size:1.25rem;font-weight:500;cursor:pointer;transition:all .3s;font-family:var(--font-ja);white-space:nowrap}
    .filter-btn:hover{border-color:var(--gray-700);color:var(--white)}
    .filter-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--black);font-weight:600}
    .toolbar-right{display:flex;align-items:center;gap:1rem}
    .search-box{position:relative}
    .search-box input{background:var(--gray-900);border:1px solid var(--gray-800);border-radius:10px;padding:.5rem .75rem .5rem 2.25rem;color:var(--white);font-size:1.25rem;width:220px;font-family:var(--font-ja);outline:none}
    .search-box input::placeholder{color:var(--gray-700)}
    .search-box input:focus{border-color:var(--yellow)}
    .search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--gray-700);pointer-events:none}
    .year-filters{display:flex;gap:.35rem;flex-wrap:wrap}
    .year-btn{background:transparent;border:none;color:var(--gray-400);padding:.3rem .6rem;border-radius:6px;font-size:1.25rem;font-weight:600;cursor:pointer;font-family:var(--font-en)}
    .year-btn:hover{color:var(--white);background:var(--gray-800)}
    .year-btn.active{color:var(--yellow);background:rgba(255,229,0,0.1)}
    .count-badge{font-family:var(--font-en);font-size:1.25rem;color:var(--gray-400);white-space:nowrap}
    .count-badge strong{color:var(--yellow);font-weight:700}
    .gallery{max-width:1400px;margin:0 auto;padding:2rem}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem}
    .work-card{background:var(--gray-900);border-radius:14px;overflow:hidden;border:1px solid var(--gray-800);transition:all .3s;cursor:pointer;display:block}
    .work-card:hover{border-color:rgba(255,229,0,0.6);transform:translateY(-4px);box-shadow:0 12px 40px rgba(255,229,0,0.3)}
    .work-card-image{aspect-ratio:1;overflow:hidden;position:relative;background:var(--gray-800)}
    .work-card-image img{width:100%;height:100%;object-fit:cover;transition:transform .5s;display:block;image-rendering:auto}
    .work-card:hover .work-card-image img{transform:scale(1.05)}
    .work-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,0.8) 0%,transparent 50%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:1rem}
    .work-card:hover .work-card-overlay{opacity:1}
    .work-card-overlay span{font-size:1.25rem;background:rgba(255,229,0,0.95);color:var(--black);padding:.2rem .6rem;border-radius:4px;font-weight:600;font-family:var(--font-en)}
    .work-card-body{padding:1rem 1.25rem 1.25rem}
    .work-card-meta{display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem}
    .work-card-date{font-family:var(--font-en);font-size:1.25rem;font-weight:600;color:var(--yellow)}
    .work-card-category{font-size:.75rem;color:var(--gray-400);background:var(--gray-800);padding:.15rem .5rem;border-radius:4px}
    .work-card h3{font-size:1.3rem;font-weight:600;line-height:1.9;color:var(--white);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .work-card-excerpt{font-size:1.25rem;color:var(--gray-400);margin-top:.35rem;line-height:1.9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .load-more-area{text-align:center;padding:3rem 2rem 5rem}
    .load-more-btn{background:transparent;border:1px solid var(--gray-700);color:var(--white);padding:.9rem 2.5rem;border-radius:100px;font-size:1.3rem;font-weight:600;cursor:pointer;font-family:var(--font-ja)}
    .load-more-btn:hover{border-color:var(--yellow);color:var(--yellow)}
    .load-more-count{font-size:1.25rem;color:var(--gray-700);margin-top:.75rem;font-family:var(--font-en)}
    /* ===== LIGHTBOX ===== */
    .lightbox{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.96);align-items:center;justify-content:center;padding:2rem}
    .lightbox.active{display:flex}
    .lightbox-close{position:absolute;top:1.25rem;right:1.25rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--white);font-size:1.4rem;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s,border-color .2s,transform .2s;z-index:10}
    .lightbox-close:hover{background:rgba(255,229,0,0.15);border-color:rgba(255,229,0,0.5);color:var(--yellow);transform:rotate(90deg)}

    /* Nav arrows */
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--white);cursor:pointer;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s,transform .2s,opacity .2s;z-index:10;outline:none}
    .lb-nav:hover{background:rgba(255,229,0,0.18);border-color:rgba(255,229,0,0.6);color:var(--yellow)}
    .lb-nav:active{transform:translateY(-50%) scale(.92)}
    .lb-nav.disabled{opacity:.2;pointer-events:none}
    .lb-nav-prev{left:1.25rem}
    .lb-nav-next{right:1.25rem}
    .lb-nav svg{width:22px;height:22px;flex-shrink:0}

    /* Counter */
    .lb-counter{position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);font-family:var(--font-en);font-size:.8rem;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:.12em;white-space:nowrap;pointer-events:none}

    /* Content */
    .lightbox-content{max-width:1060px;width:100%;display:flex;gap:2.5rem;align-items:center}
    .lightbox-info{width:300px;flex-shrink:0;order:1}
    .lightbox-image{flex:1;min-width:0;order:2;position:relative}

    /* Image crossfade */
    .lb-img-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;background:var(--gray-900)}
    .lb-img-wrap img{display:block;width:100%;max-height:78vh;object-fit:contain;border-radius:14px;transition:opacity .25s ease;opacity:1}
    .lb-img-wrap img.lb-fade{opacity:0}

    .lightbox-date{font-family:var(--font-en);font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:.6rem}
    .lightbox-title{font-size:1.05rem;font-weight:700;margin-bottom:.9rem;line-height:1.7;color:var(--white)}
    .lightbox-excerpt{font-size:.9rem;color:var(--gray-400);line-height:1.85;margin-bottom:1.25rem}
    .lightbox-youtube{display:inline-flex;align-items:center;gap:.5rem;background:#FF0000;color:#fff;text-decoration:none;padding:.55rem 1.1rem;border-radius:8px;font-size:.85rem;font-weight:700;transition:opacity .2s,transform .2s}
    .lightbox-youtube:hover{opacity:.88;transform:translateY(-1px)}
    .lightbox-youtube svg{flex-shrink:0}

    /* Info fade on navigate */
    .lightbox-info.lb-info-fade{opacity:0;transform:translateY(6px);transition:opacity .18s ease,transform .18s ease}
    .lightbox-info{transition:opacity .18s ease,transform .18s ease}

    @media(max-width:900px){
      .lightbox{padding:1rem .5rem 3.5rem}
      .lightbox-content{flex-direction:column;max-height:92vh;overflow-y:auto;gap:1.25rem}
      .lightbox-info{width:100%;order:2}
      .lightbox-image{order:1;width:100%}
      .lb-nav{width:44px;height:44px;top:auto;bottom:1rem;transform:none}
      .lb-nav:active{transform:scale(.92)}
      .lb-nav-prev{left:1.25rem}
      .lb-nav-next{right:1.25rem}
      .lb-counter{bottom:.35rem}
    }
    .no-results{text-align:center;padding:4rem 2rem;color:var(--gray-400);display:none}
    footer{background:var(--dark);border-top:1px solid var(--gray-800);padding:2rem;text-align:center}
    footer p{font-size:1.25rem;color:var(--gray-700);font-family:var(--font-en)}
    footer a{color:var(--gray-400);text-decoration:none}
    @media(max-width:900px){nav{display:none}.hamburger{display:flex}.toolbar-inner{flex-direction:column;align-items:stretch}.toolbar-right{justify-content:space-between}.search-box{flex:1}.search-box input{width:100%}.lightbox-content{flex-direction:column;max-height:90vh;overflow-y:auto}.lightbox-info{width:100%;order:2}.lightbox-image{order:1}}
    @media(max-width:600px){header{padding:0 1.25rem}.page-hero{padding:110px 1.25rem 2rem}.toolbar{padding:.75rem 1.25rem}.gallery{padding:1.25rem}.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}.work-card-body{padding:.75rem}.work-card h3{font-size:1.25rem}.work-card-excerpt{display:none}}

    @media(max-width:400px){
      .gallery-grid{grid-template-columns:repeat(2,1fr);gap:.5rem}
      .work-card h3{font-size:1.1rem}
      .stats-bar{gap:1.5rem}
      .stat-number{font-size:1.3rem}
      .filters{gap:.35rem}
      .filter-btn{padding:.35rem .75rem;font-size:1.1rem}
      .lb-nav-prev{left:.5rem}
      .lb-nav-next{right:.5rem}
    }
  </style>

  <script>
    (function() {
      var works = WORKS_DATA;
      var filtered = [];
      var shown = 0;
      var PER_PAGE = 24;
      var catFilter = 'all';
      var yearFilter = 'all';
      var searchQuery = '';
      var grid = document.getElementById('grid');

      console.log('GPS Runner Works: loaded ' + works.length + ' items');
      document.getElementById('totalCount').textContent = works.length;

      // Build year buttons
      var yearSet = {};
      for (var i = 0; i < works.length; i++) yearSet[works[i].date.substring(0,4)] = true;
      var years = Object.keys(yearSet).sort().reverse();
      var yh = '<button class="year-btn active" data-year="all">ALL</button>';
      for (var j = 0; j < years.length; j++) yh += '<button class="year-btn" data-year="'+years[j]+'">'+years[j]+'</button>';
      document.getElementById('yearFilters').innerHTML = yh;

      // Filter clicks
      document.getElementById('catFilters').onclick = function(e) {
        if (!e.target.classList.contains('filter-btn')) return;
        [].forEach.call(document.querySelectorAll('.filter-btn'), function(b){b.classList.remove('active')});
        e.target.classList.add('active');
        catFilter = e.target.getAttribute('data-filter');
        doFilter();
      };
      document.getElementById('yearFilters').onclick = function(e) {
        if (!e.target.classList.contains('year-btn')) return;
        [].forEach.call(document.querySelectorAll('.year-btn'), function(b){b.classList.remove('active')});
        e.target.classList.add('active');
        yearFilter = e.target.getAttribute('data-year');
        doFilter();
      };

      var timer;
      document.getElementById('searchInput').oninput = function(e) {
        clearTimeout(timer);
        var v = e.target.value;
        timer = setTimeout(function(){ searchQuery = v.toLowerCase().trim(); doFilter(); }, 200);
      };

      function doFilter() {
        filtered = [];
        for (var i = 0; i < works.length; i++) {
          var w = works[i];
          if (catFilter !== 'all') {
            var c = w.categories.join(' ').toLowerCase();
            if (catFilter === 'illustration' && c.indexOf('illustration') < 0) continue;
            if (catFilter === 'calligraphy' && c.indexOf('calligraphy') < 0) continue;
          }
          if (yearFilter !== 'all' && w.date.substring(0,4) !== yearFilter) continue;
          if (searchQuery && (w.title+' '+(w.excerpt||'')).toLowerCase().indexOf(searchQuery) < 0) continue;
          filtered.push(w);
        }
        document.getElementById('filteredCount').textContent = filtered.length;
        shown = 0;
        grid.innerHTML = '';
        if (filtered.length === 0) {
          document.getElementById('noResults').style.display = 'block';
          document.getElementById('loadMoreBtn').style.display = 'none';
          document.getElementById('loadMoreCount').textContent = '';
        } else {
          document.getElementById('noResults').style.display = 'none';
          showMore();
        }
      }

      function showMore() {
        var end = Math.min(shown + PER_PAGE, filtered.length);
        var frag = document.createDocumentFragment();
        for (var i = shown; i < end; i++) frag.appendChild(makeCard(filtered[i], i));
        grid.appendChild(frag);
        shown = end;
        document.getElementById('loadMoreBtn').style.display = (shown >= filtered.length) ? 'none' : 'inline-block';
        document.getElementById('loadMoreCount').textContent = shown + ' / ' + filtered.length + ' works';
      }
      document.getElementById('loadMoreBtn').onclick = showMore;

      function makeCard(w, idx) {
        var el = document.createElement('div');
        el.className = 'work-card';
        // Use closure over idx — but idx may shift after doFilter, so store work id and look up
        el.setAttribute('data-work-id', w.id);
        el.onclick = function() {
          // Find current index in filtered (handles re-filter)
          var wid = parseInt(this.getAttribute('data-work-id'), 10);
          for (var fi = 0; fi < filtered.length; fi++) {
            if (filtered[fi].id === wid) { openLB(fi); return; }
          }
        };
        var d = new Date(w.date);
        var ds = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0');
        var ct = w.categories.join(' ');
        var cl = ct.indexOf('ILLUSTRATION')>=0?'ILLUSTRATION':(ct.indexOf('CALLIGRAPHY')>=0?'CALLIGRAPHY':'');
        var src = w.medium_url || w.thumbnail_url || '';
        el.innerHTML =
          '<div class="work-card-image">' +
            '<img src="'+src+'" alt="" loading="lazy">' +
            '<div class="work-card-overlay"><span>VIEW</span></div>' +
          '</div>' +
          '<div class="work-card-body">' +
            '<div class="work-card-meta">' +
              '<span class="work-card-date">'+ds+'</span>' +
              (cl ? '<span class="work-card-category">'+cl+'</span>' : '') +
            '</div>' +
            '<h3></h3>' +
          '</div>';
        el.querySelector('h3').textContent = w.title;
        return el;
      }

      /* ===== LIGHTBOX NAV ===== */
      var lbIndex = 0;
      var lbImg   = document.getElementById('lbImg');
      var lbInfo  = document.getElementById('lbInfo');
      var lbPrev  = document.getElementById('lbPrev');
      var lbNext  = document.getElementById('lbNext');
      var lbCtr   = document.getElementById('lbCounter');

      function openLB(idx) {
        lbIndex = idx;
        renderLB(false);
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function renderLB(animate) {
        var w = filtered[lbIndex];
        if (!w) return;

        // Counter
        lbCtr.textContent = (lbIndex + 1) + ' / ' + filtered.length;

        // Arrow state
        lbPrev.classList.toggle('disabled', lbIndex === 0);
        lbNext.classList.toggle('disabled', lbIndex === filtered.length - 1);

        if (animate) {
          // Crossfade image
          lbImg.classList.add('lb-fade');
          // Fade info out
          lbInfo.style.opacity = '0';
          lbInfo.style.transform = 'translateY(8px)';

          setTimeout(function() {
            setContent(w);
            lbImg.classList.remove('lb-fade');
            lbInfo.style.opacity = '1';
            lbInfo.style.transform = 'translateY(0)';
          }, 200);
        } else {
          setContent(w);
        }

        // Preload adjacent images
        [lbIndex - 1, lbIndex + 1].forEach(function(i) {
          if (filtered[i]) {
            var pre = new Image();
            pre.src = filtered[i].medium_url || filtered[i].full_image_url || '';
          }
        });
      }

      function setContent(w) {
        lbImg.src = w.medium_url || w.full_image_url || '';
        lbImg.alt = w.title;
        document.getElementById('lbDate').textContent = w.date;
        document.getElementById('lbTitle').textContent = w.title;
        document.getElementById('lbExcerpt').textContent = w.excerpt || '';
        var yt = document.getElementById('lbYoutube');
        if (w.youtube_url) {
          yt.innerHTML = '<a class="lightbox-youtube" href="' + w.youtube_url + '" target="_blank" rel="noopener noreferrer">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.38.55A3.02 3.02 0 00.5 6.19C0 8.08 0 12 0 12s0 3.92.5 5.81a3.02 3.02 0 002.12 2.14C4.5 20.5 12 20.5 12 20.5s7.5 0 9.38-.55a3.02 3.02 0 002.12-2.14C24 15.92 24 12 24 12s0-3.92-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>' +
            'YouTube で見る</a>';
        } else {
          yt.innerHTML = '';
        }
      }

      function navigate(delta) {
        var next = lbIndex + delta;
        if (next < 0 || next >= filtered.length) return;
        lbIndex = next;
        renderLB(true);
      }

      lbPrev.onclick = function(e) { e.stopPropagation(); navigate(-1); };
      lbNext.onclick = function(e) { e.stopPropagation(); navigate(1); };

      document.getElementById('lightboxClose').onclick = closeLB;
      document.getElementById('lightbox').onclick = function(e) { if (e.target === this) closeLB(); };

      // Keyboard
      document.addEventListener('keydown', function(e) {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape')       { closeLB(); }
        else if (e.key === 'ArrowLeft')  { navigate(-1); }
        else if (e.key === 'ArrowRight') { navigate(1); }
      });

      // Touch swipe
      var touchStartX = 0;
      var touchStartY = 0;
      document.getElementById('lightbox').addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      document.getElementById('lightbox').addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        var dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
          navigate(dx < 0 ? 1 : -1);
        }
      }, { passive: true });

      function closeLB() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
      }

      window.onscroll = function(){document.getElementById('header').classList.toggle('scrolled',window.scrollY>50)};
      document.getElementById('hamburger').onclick = function(){
        this.classList.toggle('active');
        document.getElementById('mobileNav').classList.toggle('active');
      };

      // Start
      doFilter();
      console.log('GPS Runner Works: init complete');
    })();
  </script>
</body>
</html>
